# API configuration settings
server:
  host: localhost
  port: 8000

mimetypes:
  error: ["application/json"]
  json: ["application/json"]
  pdf: ["application/pdf"]
  docx:
    - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"

cors:
  enabled: true
  supports_credentials: false
  origins: "*"
  # origins:
  #   - http://<your-alb-dns-name>.<region>.elb.amazonaws.com
  #   - http://localhost:8000
  #   - http://127.0.0.1:8000
  #   - http://0.0.0.0:8000
  expose_headers:
    - Content-Disposition
    - Content-Type
    - Content-Length

input:
  prefer_file: true

output:
  use_temp_directory: true

swagger:
  # Path prefix prepended to the Swagger UI mount point ("/swagger").
  # Useful when the app sits behind a reverse proxy that strips a path prefix.
  # e.g. with path_prefix: /myapp, assets load from /myapp/swagger instead of /swagger.
  # path_prefix: dev-app-alb-744208816.us-east-2.elb.amazonaws.com:8000

logging:
  level: INFO
