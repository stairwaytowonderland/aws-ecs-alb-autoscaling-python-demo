default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      # - id: terraform_wrapper_module_for_each
      # - id: terraform_docs
        # args:
        #   - '--args=--lockfile=false --config=.terraform-docs.yml'
  - repo: https://github.com/terraform-docs/terraform-docs
    rev: "v0.20.0"
    hooks:
      - id: terraform-docs-go
        args: ["markdown", "table", "--config", ".terraform-docs.yml", "--recursive", "--recursive-path=aws", "./infra"]
        # files: "^(?!.*\\.md$)" # Exclude markdown files from being processed by terraform-docs if they are the output
      - id: terraform-docs-go
        args: ["markdown", "table", "--config", ".terraform-docs.yml", "--recursive", "--recursive-path=modules", "./infra"]
        # files: "^(?!.*\\.md$)" # Exclude markdown files from being processed by terraform-docs if they are the output
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
        # https://github.com/pre-commit/pre-commit-hooks?tab=readme-ov-file#check-yaml
        # --allow-multiple-documents: allow yaml files which use the multi-document syntax
        # --unsafe: Instead of loading the files, simply parse them for syntax
        args: [--allow-multiple-documents, --unsafe]
      - id: check-merge-conflict
      # - id: no-commit-to-branch
      #   args: [--branch, main]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        name: black
        args: [src,--line-length=88]

